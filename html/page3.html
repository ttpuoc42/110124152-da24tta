<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Đăng ký</title>
    <link rel="stylesheet" href="../css/style3.css">
</head>
<body>

<div class="container">
    <h2>Đăng Ký Tài Khoản ITHUB</h2>

    <form>
        <label>Họ tên</label>
        <input type="text" placeholder="Nhập họ tên">

        <label>MSSV</label>
        <input type="text" placeholder="Nhập MSSV">

        <label>Mã lớp</label>
        <select>
            <option>DA25</option>
            <option>DA24</option>
            <option>DA23</option>
        </select>

        <label>Giới tính</label>
        <div class="inline">
            <input type="radio" name="gt"> Nam
            <input type="radio" name="gt"> Nữ
        </div>

        <label>Điểm mạnh</label>
        <div class="inline">
            <input type="checkbox"> Code
            <input type="checkbox"> Web
            <input type="checkbox"> Thuyết trình
        </div>

        <label>Nội dung giới thiệu</label>
        <textarea rows="3"></textarea>

        <div class="btn">
            <button type="submit">Đăng ký</button>
            <button type="reset">Nhập lại</button>
        </div>
    </form>
</div>

</body>
</html>
