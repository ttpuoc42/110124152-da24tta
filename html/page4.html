<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đơn hàng của bạn</title>
    <link rel="stylesheet" href ="../css/style4.css">
</head>
<body>
    <h2>Hóa đơn mua hàng </h2>
    <table border="1" cellpading="10">
        <tr>
            <th>Tên sản phẩm</th>
            <th>Số lượng</th>
            <th>Đơn giá</th>
            <th>Thành tiền</th>
        </tr>
        <tr>
            <td>Mì gói</td>
            <td class="sl">3</td>
            <td class="dg">1000</td>
            <td class="tt"></td>
        </tr>
        <tr>
            <td>Dầu gội</td>
            <td class="sl">4</td>
            <td class="dg">2000</td>
            <td class="tt"></td>
        </tr>
         <tr>
            <td>Xúc xích</td>
            <td class="sl">7</td>
            <td class="dg">500</td>
            <td class="tt"></td>
        </tr>
    </table>
    <h3 id="tongtien"></h3>
    <script>
        let tongThanhToan = 0;

        let soLuong=document.getElementsByClassName("sl");
        let donGia=document.getElementsByClassName("dg");
        let thanhTien=document.getElementsByClassName("tt");

        for(let i=0; i<soLuong.length;i++){
            thanhTien[i].innerHTML=soLuong[i].innerHTML*donGia[i].innerHTML;
            tongThanhToan +=parseInt(thanhTien[i].innerHTML);
        }
        document.getElementById("tongtien").innerHTML="Tổng tiền cần Thanh Toán: " +tongThanhToan;
    </script>
</body>
