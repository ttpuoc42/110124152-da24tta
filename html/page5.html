<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../css/style5.css">
    <title>Bài tập 9</title>
</head>
<body>
<form id="frmInCC">

    <label>Nhập cửu chương</label>
        <input type="text" id="txtSo" value="5">
        <input type="button" value="In" onclick="inBangCC();">
    </form>
    <div id="ketqua"></div>
    <script>
        function inBangCC(){
            let myForm= document.forms["frmInCC"];
            let num= myForm.elements[0].value;
            let kq=document.getElementById("ketqua");
        num=parseInt(num);
        let s= "";
        for (let i=1;i<=10;i++){
            s+=num +" * " +i+ "=" +(num*i)+"<br>";
        }
        kq.innerHTML= s;
    }
    </script>
</body>
