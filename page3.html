<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký</title>
    <link rel="stylesheet" href="../css/style3.css">
</head>
<body>

<form class="form">
    <h2>Đăng ký ITHUB</h2>

    <label>Họ tên</label>
    <input type="text" placeholder="Nhập họ tên">

    <label>MSSV</label>
    <input type="text" placeholder="Nhập MSSV">

    <label>Mã lớp</label>
    <select>
        <option>DA24TTA</option>
        <option>DA24TTB</option>
        <option>DA24TTC</option>
    </select>

    <label>Giới tính</label>
    <div class="row">
        <input type="radio" name="gt"> Nam
        <input type="radio" name="gt"> Nữ
    </div>

    <label>Điểm mạnh</label>
    <div class="row">
        <input type="checkbox"> Code
        <input type="checkbox"> Web
        <input type="checkbox"> Thuyết trình
    </div>

    <label>Giới thiệu</label>
    <textarea rows="3"></textarea>

    <button type="submit">Đăng ký</button>
</form>

</body>
</html>
